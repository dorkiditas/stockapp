<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alpha Desk</title>
<link rel="apple-touch-icon" sizes="180x180" href="https://dorkiditas.github.io/stockapp/apple-touch-icon.png">
<link rel="apple-touch-icon" href="https://dorkiditas.github.io/stockapp/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="https://dorkiditas.github.io/stockapp/icon-192.png">
<link rel="icon" type="image/png" href="https://dorkiditas.github.io/stockapp/favicon.png">
<link rel="shortcut icon" href="https://dorkiditas.github.io/stockapp/favicon.png">
<link rel="manifest" href="https://dorkiditas.github.io/stockapp/manifest.webmanifest">
<meta name="theme-color" content="#17513A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Alpha Desk">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:#F3F5EF;font-family:Georgia,'PingFang SC',serif;color:#14201A}
  .card{text-align:center;padding:36px;max-width:340px}
  .mark{width:64px;height:64px;border-radius:16px;margin:0 auto 18px;
        background:linear-gradient(135deg,#1E7A56,#0E3A29);display:flex;align-items:center;
        justify-content:center;color:#F4F1E7;font-size:34px;font-style:italic;
        box-shadow:0 10px 28px rgba(23,81,58,.3);border:1px solid rgba(194,164,106,.5)}
  h1{font-size:26px;margin:0 0 6px;letter-spacing:.02em}
  p{color:#68706A;font-size:14px;margin:6px 0}
  a{color:#1E7A56;font-weight:600}
  .btn{display:inline-block;margin:10px 0 4px;padding:12px 26px;border-radius:12px;
       background:#1E7A56;color:#FBFCF8 !important;text-decoration:none;font-size:16px}
  #fallback,#wxtip{display:none}
  .tip{font-size:12px;color:#8a8f89;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="mark">&#945;</div>
  <h1>Alpha Desk</h1>
  <div id="wxtip"><p style="color:#BC4B3C">你在微信里打开的——请点右上角「···」→「在浏览器打开」,才能正常进入和添加到主屏幕。</p></div>
  <p id="status">正在检测通道…</p>
  <p><a id="go" class="btn" href="https://paragraphs-vehicles-fleece-soul.trycloudflare.com">进入工作台</a></p>
  <div id="fallback">
    <p style="color:#BC4B3C">主通道不通,<span id="cd">3</span>秒后自动转云端备份版…</p>
    <p><a id="gocloud" class="btn" style="background:#B99150"
          href="https://stockapp-99rbhabczaebwv2fkzqm9a.streamlit.app">立即进云端备份版</a></p>
  </div>
  <p style="font-size:12px">家里WiFi固定地址:<br><a href="http://10.0.66.237:8501">http://10.0.66.237:8501</a></p>
  <p class="tip">📌 添加主屏幕请在此页操作(iPhone:Safari分享→添加到主屏幕),这样图标才是绿色α。</p>
</div>
<script>
  var TARGET = "https://paragraphs-vehicles-fleece-soul.trycloudflare.com";
  document.getElementById("go").href = TARGET;
  var ua = navigator.userAgent || "";
  var isWx = /MicroMessenger/i.test(ua);
  if (isWx) { document.getElementById("wxtip").style.display = "block"; }
  var standalone = window.navigator.standalone === true ||
                   (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
  // 图片探测:跨域也能分辨真实成败(no-cors fetch 读不到状态码,
  // 会把"边缘530/隧道已废"误判成通 —— 2026-07-11 trycloudflare 抽风日的教训)
  var probe = new Promise(function(res, rej){
    var t = setTimeout(function(){ rej("timeout"); }, 5000);
    var img = new Image();
    img.onload  = function(){ clearTimeout(t); res(); };
    img.onerror = function(){ clearTimeout(t); rej("err"); };
    img.src = TARGET + "/favicon.png?t=" + Date.now();
  });
  probe.then(function(){
    document.getElementById("status").textContent = "通道正常";
    // 主屏App(standalone)秒进;普通浏览器停8秒,给"添加到主屏幕"留足时间
    if (!isWx) setTimeout(function(){ window.location.href = TARGET; }, standalone ? 200 : 8000);
  }).catch(function(){
    document.getElementById("status").textContent = "";
    document.getElementById("fallback").style.display = "block";
    var CLOUD = "https://stockapp-99rbhabczaebwv2fkzqm9a.streamlit.app";
    var n = 3, el = document.getElementById("cd");
    var iv = setInterval(function(){
      n--; if (el) el.textContent = n;
      if (n <= 0) { clearInterval(iv); window.location.href = CLOUD; }
    }, 1000);
  });
</script>
</body>
</html>
