<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alpha Desk</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#17513A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Alpha Desk">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:#F3F5EF;font-family:Georgia,'PingFang SC',serif;color:#14201A}
  .card{text-align:center;padding:40px}
  .mark{width:64px;height:64px;border-radius:16px;margin:0 auto 18px;
        background:linear-gradient(135deg,#1E7A56,#0E3A29);display:flex;align-items:center;
        justify-content:center;color:#F4F1E7;font-size:34px;font-style:italic;
        box-shadow:0 10px 28px rgba(23,81,58,.3);border:1px solid rgba(194,164,106,.5)}
  h1{font-size:26px;margin:0 0 6px;letter-spacing:.02em}
  p{color:#68706A;font-size:14px;margin:4px 0}
  a{color:#1E7A56;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="mark">&#945;</div>
  <h1>Alpha Desk</h1>
  <p>正在进入工作台…</p>
  <p><a id="go" href="https://api.trycloudflare.com">点这里直接进入</a></p>
  <p style="margin-top:14px;font-size:12px">家里WiFi可用固定地址:<br><a href="http://10.0.66.237:8501">http://10.0.66.237:8501</a></p>
</div>
<script>
  var TARGET = "https://api.trycloudflare.com";
  document.getElementById("go").href = TARGET;
  var standalone = window.navigator.standalone === true ||
                   (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
  setTimeout(function(){ window.location.href = TARGET; }, standalone ? 300 : 3500);
</script>
</body>
</html>
