<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alpha Desk</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#17513A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Alpha Desk">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:#F3F5EF;font-family:Georgia,'PingFang SC',serif;color:#14201A}
  .card{text-align:center;padding:40px;max-width:340px}
  .mark{width:64px;height:64px;border-radius:16px;margin:0 auto 18px;
        background:linear-gradient(135deg,#1E7A56,#0E3A29);display:flex;align-items:center;
        justify-content:center;color:#F4F1E7;font-size:34px;font-style:italic;
        box-shadow:0 10px 28px rgba(23,81,58,.3);border:1px solid rgba(194,164,106,.5)}
  h1{font-size:26px;margin:0 0 6px;letter-spacing:.02em}
  p{color:#68706A;font-size:14px;margin:6px 0}
  a{color:#1E7A56;font-weight:600}
  #fallback{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="mark">&#945;</div>
  <h1>Alpha Desk</h1>
  <p id="status">正在检测通道…</p>
  <p><a id="go" href="https://rankings-apollo-murray-pot.trycloudflare.com">外网通道</a></p>
  <div id="fallback">
    <p style="color:#BC4B3C">外网通道恢复中(每10分钟自动修复,稍后刷新本页即可)。</p>
  </div>
  <p style="margin-top:14px;font-size:12px">家里WiFi固定地址:<br><a href="http://10.0.66.237:8501">http://10.0.66.237:8501</a></p>
</div>
<script>
  var TARGET = "https://rankings-apollo-murray-pot.trycloudflare.com";
  document.getElementById("go").href = TARGET;
  var standalone = window.navigator.standalone === true ||
                   (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
  var probe = new Promise(function(res, rej){
    var t = setTimeout(function(){ rej("timeout"); }, 5000);
    fetch(TARGET + "/healthz", {mode: "no-cors"}).then(function(){ clearTimeout(t); res(); },
                                                       function(e){ clearTimeout(t); rej(e); });
  });
  probe.then(function(){
    document.getElementById("status").textContent = "通道正常,正在进入…";
    setTimeout(function(){ window.location.href = TARGET; }, standalone ? 200 : 2500);
  }).catch(function(){
    document.getElementById("status").textContent = "";
    document.getElementById("fallback").style.display = "block";
  });
</script>
</body>
</html>
